name: Build mobile APK

# Builds the Flutter Android app in the cloud so no local Flutter/Android toolchain
# is needed. Produces an installable APK you can download from the run's "Artifacts"
# and sideload onto an Android phone. Also runs `flutter analyze` so compile/lint
# issues show up in the logs.
on:
  push:
    paths:
      - 'mobile/**'
      - '.github/workflows/build-mobile-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # `flutter create .` backfills the android/ platform folder around our lib/,
      # but it also overwrites pubspec.yaml and lib/main.dart with its template…
      - name: Backfill Android platform files
        run: flutter create --project-name dad_mobile --org com.dadassistant --platforms=android .

      # …so restore our real app code + dependencies from the repo.
      - name: Restore app code
        run: git checkout -- lib pubspec.yaml

      # `flutter create` only adds INTERNET permission to the debug/profile manifests,
      # so release APKs can't make network calls. Add it to the main manifest.
      - name: Ensure INTERNET permission (release manifest)
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.INTERNET' "$MANIFEST" || \
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET"/>' "$MANIFEST"
          echo "--- manifest head ---"
          head -n 5 "$MANIFEST"

      # file_picker needs compileSdk 36; firebase needs minSdk 23. The Flutter template
      # targets 34/lower. Force both in the app Gradle file (Groovy or Kotlin DSL).
      - name: Set Android SDK levels
        run: |
          for f in android/app/build.gradle android/app/build.gradle.kts; do
            if [ -f "$f" ]; then
              sed -i 's/flutter\.compileSdkVersion/36/g' "$f"
              sed -i 's/flutter\.minSdkVersion/23/g' "$f"
              echo "--- $f (sdk lines) ---"
              grep -nE "compileSdk|minSdk" "$f" || true
            fi
          done

      - name: Install dependencies
        run: flutter pub get

      # Informational — shows analyzer/deprecation output but doesn't fail the build.
      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      # This is the real gate: a genuine compile error fails here.
      # If the GOOGLE_SERVICES_JSON secret is set, extract the Firebase config values
      # and pass them to the app so push notifications work. If not, build without them
      # (push stays disabled — the app is otherwise identical).
      - name: Build release APK
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          DEFINES=""
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > /tmp/gs.json
            API_KEY=$(jq -r '.client[0].api_key[0].current_key' /tmp/gs.json)
            APP_ID=$(jq -r '.client[0].client_info.mobilesdk_app_id' /tmp/gs.json)
            SENDER_ID=$(jq -r '.project_info.project_number' /tmp/gs.json)
            PROJECT_ID=$(jq -r '.project_info.project_id' /tmp/gs.json)
            DEFINES="--dart-define=FIREBASE_API_KEY=$API_KEY --dart-define=FIREBASE_APP_ID=$APP_ID --dart-define=FIREBASE_SENDER_ID=$SENDER_ID --dart-define=FIREBASE_PROJECT_ID=$PROJECT_ID"
            echo "Firebase config: ENABLED (project $PROJECT_ID)"
          else
            echo "Firebase config: not set — building with push disabled"
          fi
          flutter build apk --release $DEFINES

      - uses: actions/upload-artifact@v4
        with:
          name: dad-app-android
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
