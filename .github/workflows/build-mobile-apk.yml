name: Build mobile APK

# Builds the Flutter Android app in the cloud so no local Flutter/Android toolchain
# is needed. Produces an installable APK you can download from the run's "Artifacts"
# and sideload onto an Android phone. Also runs `flutter analyze` so compile/lint
# issues show up in the logs.
on:
  push:
    paths:
      - 'mobile/**'
      - '.github/workflows/build-mobile-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # `flutter create .` backfills the android/ platform folder around our lib/,
      # but it also overwrites pubspec.yaml and lib/main.dart with its template…
      - name: Backfill Android platform files
        run: flutter create --project-name dad_mobile --org com.dadassistant --platforms=android .

      # …so restore our real app code + dependencies from the repo.
      - name: Restore app code
        run: git checkout -- lib pubspec.yaml

      # `flutter create` only adds INTERNET permission to the debug/profile manifests,
      # so release APKs can't make network calls. Add it to the main manifest.
      - name: Ensure INTERNET permission (release manifest)
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.INTERNET' "$MANIFEST" || \
            sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET"/>' "$MANIFEST"
          echo "--- manifest head ---"
          head -n 5 "$MANIFEST"

      # file_picker's newest transitive deps require compileSdk 36; the Flutter
      # template targets 34. Force 36 in the app Gradle file (Groovy or Kotlin DSL).
      - name: Bump compileSdk to 36
        run: |
          for f in android/app/build.gradle android/app/build.gradle.kts; do
            if [ -f "$f" ]; then
              sed -i 's/flutter\.compileSdkVersion/36/g' "$f"
              echo "--- $f (compileSdk lines) ---"
              grep -n "compileSdk" "$f" || true
            fi
          done

      - name: Install dependencies
        run: flutter pub get

      # Informational — shows analyzer/deprecation output but doesn't fail the build.
      - name: Analyze
        run: flutter analyze
        continue-on-error: true

      # This is the real gate: a genuine compile error fails here.
      - name: Build release APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: dad-app-android
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
