name: Keep API awake

# Pings the Render API's health endpoint so the free-tier service doesn't spin down after ~15 min
# of inactivity (which causes a slow ~30-50s cold start on the next real request). Runs on a
# schedule and can also be triggered manually. Note: GitHub disables scheduled workflows after
# 60 days with no repo commits, and cron times can be delayed a few minutes.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: curl -fsS --max-time 90 https://dad-api-rw61.onrender.com/health || true
