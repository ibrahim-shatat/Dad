# Render Blueprint for the Dad backend API (Path B: free, no Docker, no Redis/worker).
# In Render: New + -> Blueprint -> connect this repo. Render reads this file.
# Fill the "sync: false" secrets in the dashboard after the service is created.
services:
  - type: web
    name: dad-api
    runtime: python
    plan: free
    rootDir: backend
    # Installs deps and applies DB migrations against Supabase on every deploy.
    buildCommand: "pip install . && alembic upgrade head"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      # Run jobs in-process (no Redis / no separate worker).
      - key: JOB_MODE
        value: inline
      - key: CLAUDE_MODEL_FAST
        value: claude-haiku-4-5-20251001
      - key: CLAUDE_MODEL_SMART
        value: claude-sonnet-5
      # Durable object storage so uploaded docs / generated .pptx survive restarts (Render's free
      # disk is ephemeral). Set STORAGE_BACKEND=supabase and fill the two secrets below.
      - key: STORAGE_BACKEND
        value: supabase
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: SUPABASE_STORAGE_BUCKET
        value: dad-files
      - key: SUPABASE_URL             # https://<project-ref>.supabase.co
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY  # Supabase → Settings → API → service_role key (secret)
        sync: false
      - key: JWT_SECRET
        generateValue: true          # Render generates a strong random value
      # --- Web Push (VAPID). Public key + subject are not secret; private key is. ---
      - key: VAPID_PUBLIC_KEY
        value: BBnjYpzuqclXyi6K0_N85-11b7I33eqKFQVmh4MMPWuKbmXtuzvSmVpUckv0OWEqXYtpSHXVGguHq3VuhHbcClw
      - key: VAPID_SUBJECT
        value: mailto:ibrahimshatat02@gmail.com
      - key: VAPID_PRIVATE_KEY
        sync: false
      # --- Secrets to paste in the dashboard (Environment tab) ---
      - key: ANTHROPIC_API_KEY        # rotate the key used in local dev
        sync: false
      - key: TOKEN_ENCRYPTION_KEY     # Fernet key: python -c "from cryptography.fernet import Fernet;print(Fernet.generate_key().decode())"
        sync: false
      - key: DATABASE_URL             # Supabase, asyncpg form (see DEPLOY_PATHB.md)
        sync: false
      - key: CORS_ORIGINS             # your Netlify URL, e.g. https://dad-xyz.netlify.app
        sync: false
      - key: FRONTEND_URL             # same Netlify URL
        sync: false
      - key: API_BASE_URL             # this service's URL, e.g. https://dad-api.onrender.com
        sync: false
