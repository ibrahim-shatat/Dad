# Use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# Builds production images (no bind mounts/reload) and adds the Caddy reverse proxy.
services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

  worker:
    command: arq app.tasks.worker.WorkerSettings

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  caddy_data:
  caddy_config:
