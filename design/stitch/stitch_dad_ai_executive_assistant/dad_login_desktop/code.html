<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fbf8ff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .soft-shadow {
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.05);
        }
        .login-card-glow {

            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;

<body class="bg-background text-on-surface min-h-screen flex flex-col justify-center items-center overflow-hidden">
<!-- Top AppBar (Simplified for Login) -->
<header class="fixed top-0 w-full h-16 flex items-center justify-center px-margin-page bg-background border-b border-outline-variant z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="smart_toy">smart_toy</span>
<span class="font-headline-lg text-headline-lg font-semibold text-primary">Dad</span>
</div>
</header>
<main class="relative w-full max-w-container-max mx-auto flex flex-col items-center px-4">
<div class="login-card-glow"></div>
<!-- Login Card Container -->
<div class="w-full max-w-[400px] bg-surface-container-lowest rounded-xl border border-outline-variant soft-shadow p-8 flex flex-col gap-8 transition-all duration-300">
<!-- Branding/Heading Area -->
<div class="text-center space-y-2">
<h1 class="font-headline-xl text-headline-xl text-on-surface tracking-tight">Sign in</h1>
<p class="font-body-md text-on-surface-variant">Your AI chief of staff</p>
</div>
<!-- Form Area -->
<form class="flex flex-col gap-5" id="loginForm" onsubmit="return false">
<!-- Email Field -->
<div class="flex flex-col gap-1.5">
<label class="font-label-md text-label-md text-on-surface-variant ml-1 uppercase tracking-widest opacity-80" for="email">
                        Corporate Email
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant group-focus-within:text-primary transition-colors text-[20px]" data-icon="mail">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface font-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-outline-variant/60" id="email" name="email" placeholder="marcus@aurelius.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1.5">
<div class="flex justify-between items-end px-1">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest opacity-80" for="password">
                            Password
                        </label>
<a class="font-label-sm text-label-sm text-primary hover:underline transition-all" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant group-focus-within:text-primary transition-colors text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full pl-10 pr-12 py-3 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface font-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-outline-variant/60" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="mt-4 w-full py-3.5 bg-primary text-on-primary font-headline-md text-headline-md rounded-lg shadow-sm hover:bg-primary-container active:scale-[0.98] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
                    Sign in
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Social/SSO Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink mx-4 font-label-sm text-label-sm text-on-surface-variant">or continue with</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- SSO Options -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-2.5 px-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-label-md text-label-md text-on-surface hover:bg-surface-container-high transition-colors" type="button">
<img alt="Google" class="w-4 h-4" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC3VfBcRYjcd4MZSYnt8d3stWWLYuqcGrQXDQj3lLXchOTQ2qFW0L7KEhNFMz1pGwnm87TVc7M1ivUCR6Wa4OWfUonOcC7VNOMpq2Ur1RcyhYjSr7sCLkLAyBk9gJIqs7M6kevsJCQUPVQalD46gqSCky5K6cE8WJVlCjvf2f5Xf5ziBhHlR2x1J1vO98asKOa5qKQe4OhTp79jyZdThe4wvJ6pXHHEZhqUkDo2YRov_r93nGKKjVeY"/>
                        Google
                    </button>
<button class="flex items-center justify-center gap-2 py-2.5 px-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-label-md text-label-md text-on-surface hover:bg-surface-container-high transition-colors" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="terminal">terminal</span>
                        SSO
                    </button>
</div>
</form>
<!-- Footer Policy Info -->
<p class="text-center font-label-sm text-label-sm text-on-surface-variant opacity-60 leading-relaxed px-4">
                By signing in, you agree to our 
                <a class="underline hover:text-primary transition-colors" href="#">Security Architecture</a> and 
                <a class="underline hover:text-primary transition-colors" href="#">Privacy Policy</a>.
            </p>
</div>
<!-- Help Link -->
<div class="mt-8 flex items-center gap-2 text-on-surface-variant/60 hover:text-primary transition-all cursor-pointer group">
<span class="material-symbols-outlined text-[16px] group-hover:rotate-12 transition-transform" data-icon="help">help</span>
<span class="font-label-md text-label-md">Need assistance?</span>
</div>
</main>
<!-- Global Footer -->
<footer class="fixed bottom-0 w-full py-8 bg-background border-t border-outline-variant">
<div class="flex flex-col md:flex-row justify-between items-center px-margin-page max-w-container-max mx-auto gap-4">
<div class="flex flex-col gap-1 items-center md:items-start">
<span class="font-label-md text-label-md font-bold text-on-surface-variant">Dad AI</span>
<p class="font-label-sm text-label-sm text-on-surface-variant opacity-60">© 2024 Dad AI. Professional Confidentiality Guaranteed.</p>
</div>
<div class="flex gap-6">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors opacity-80 hover:opacity-100" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors opacity-80 hover:opacity-100" href="#">Terms of Service</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors opacity-80 hover:opacity-100" href="#">Security Architecture</a>
</div>
</div>
</footer>
<script>
        // Micro-interactions for login experience
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const btn = e.target.querySelector('button[type="submit"]');
            const originalHtml = btn.innerHTML;
            
            // Artificial delay to simulate processing with a "Reliable Clarity" feel
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin" data-icon="sync">sync</span> Validating Credentials...`;
            btn.classList.add('opacity-80');
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> Access Granted`;
                btn.classList.remove('bg-primary');
                btn.classList.add('bg-secondary');
                
                // Final Redirect simulation
                setTimeout(() => {
                    // console.log("Login successful");
                }, 1000);
            }, 1500);
        });

        // Toggle Password Visibility
        const passToggle = document.querySelector('button[type="button"] .material-symbols-outlined[data-icon="visibility_off"]')?.parentElement;
        if (passToggle) {
            passToggle.addEventListener('click', () => {
                const input = document.getElementById('password');
                const icon = passToggle.querySelector('.material-symbols-outlined');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.innerText = 'visibility';
                } else {
                    input.type = 'password';
                    icon.innerText = 'visibility_off';
                }
            });
        }
    </script>
</body></html>
