<style>
    body {
      background-color: #f3f4f6; /* Soft gray for background context */
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    .bottom-sheet {
      transition: transform 0.4s cubic-bezier(0.33, 1, 0.68, 1);
      transform: translateY(100%);
    }

    .bottom-sheet.open {
      transform: translateY(0);
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #e3e1ec;
      border-radius: 10px;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen">
<!-- Background App Mockup (Contextual) -->
<div class="max-w-md w-full h-[844px] bg-white shadow-2xl relative overflow-hidden flex flex-col">
<div class="p-6">
<div class="w-12 h-12 bg-primary rounded-xl mb-4"></div>
<div class="space-y-4">
<div class="h-6 w-3/4 bg-surface-container-high rounded"></div>
<div class="h-4 w-full bg-surface-container rounded"></div>
<div class="h-4 w-5/6 bg-surface-container rounded"></div>
<div class="h-32 w-full bg-surface-container-low rounded-xl"></div>
</div>
</div>
<!-- Overlay/Scrim -->
<div class="absolute inset-0 bg-black/40 opacity-0 transition-opacity duration-300 pointer-events-none z-40" id="scrim"></div>
<!-- Bottom Sheet Container -->
<div class="bottom-sheet absolute bottom-0 left-0 right-0 h-[92%] bg-surface rounded-t-[32px] flex flex-col z-50 shadow-[0_-8px_40px_-10px_rgba(0,0,0,0.15)]" id="bottomSheet">
<!-- Drag Handle -->
<div class="flex justify-center py-3">
<div class="w-12 h-1.5 bg-outline-variant rounded-full opacity-50"></div>
</div>
<!-- Header -->
<div class="px-6 pb-4 flex items-center justify-between">
<h2 class="font-headline-md text-headline-md text-on-surface">Review email draft</h2>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-high transition-colors text-on-surface-variant" onclick="toggleSheet()">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Body / Form -->
<div class="flex-1 overflow-y-auto custom-scrollbar px-6 space-y-5 py-2">
<!-- Recipient Field -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md text-outline px-1">To</label>
<div class="relative">
<input class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-xl px-4 font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" type="text" value="alex.jordan@company.com"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 flex gap-2">
<span class="material-symbols-outlined text-outline-variant text-[20px]">add_circle</span>
</div>
</div>
</div>
<!-- CC Field -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md text-outline px-1">Cc</label>
<input class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-xl px-4 font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="Add recipients..." type="text"/>
</div>
<!-- Subject Field -->
<div class="space-y-1.5">
<label class="font-label-md text-label-md text-outline px-1">Subject</label>
<input class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-xl px-4 font-body-md text-body-md text-on-surface font-medium focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" type="text" value="Re: Q4 Strategy Revisions"/>
</div>
<!-- Body Textarea -->
<div class="space-y-1.5 flex flex-col flex-1 pb-4">
<label class="font-label-md text-label-md text-outline px-1">Body</label>
<div class="relative flex-1 min-h-[300px]">
<textarea class="w-full h-full min-h-[300px] bg-surface-container-lowest border border-outline-variant rounded-xl p-4 font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all resize-none leading-relaxed">Hi Alex,

I've carefully reviewed the Q4 strategy revisions we discussed earlier. 

The adjustments to the market penetration timeline look solid, and the reallocation of resources toward the enterprise segment aligns well with our current growth targets. I've added a few minor suggestions regarding the partnership roadmap for December, but overall, this is ready to move forward.

Let me know if you'd like to jump on a quick 10-minute call to finalize these details before the executive review tomorrow.

Best regards,

[Executive Name]
AI Assistant</textarea>
<!-- AI Badge -->
<div class="absolute bottom-3 right-3 bg-primary-container/10 border border-primary/20 px-3 py-1.5 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-primary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="text-[11px] font-semibold text-primary uppercase tracking-wider">AI Drafted</span>
</div>
</div>
</div>
</div>
<!-- Footer -->
<div class="px-6 py-6 border-t border-outline-variant bg-surface-container-lowest flex gap-3">
<button class="flex-1 h-12 border border-outline rounded-xl font-label-md text-label-md text-on-surface hover:bg-surface-container transition-colors active:scale-95 duration-150" onclick="toggleSheet()">
          Close
        </button>
<button class="flex-[2] h-12 bg-primary rounded-xl font-label-md text-label-md text-on-primary hover:bg-secondary transition-colors shadow-lg shadow-primary/20 active:scale-95 duration-150" onclick="toggleSheet()">
          Save changes
        </button>
</div>
</div>
</div>
<script>
    const sheet = document.getElementById('bottomSheet');
    const scrim = document.getElementById('scrim');
    let isOpen = false;

    function toggleSheet() {
      isOpen = !isOpen;
      if (isOpen) {
        sheet.classList.add('open');
        scrim.classList.add('opacity-100');
        scrim.classList.remove('pointer-events-none');
      } else {
        sheet.classList.remove('open');
        scrim.classList.remove('opacity-100');
        scrim.classList.add('pointer-events-none');
      }
    }

    // Auto-open on load for demo purposes
    window.onload = () => {
      setTimeout(toggleSheet, 500);
    };

    // Close on scrim click
    scrim.addEventListener('click', toggleSheet);
  </script>
</body></html>
