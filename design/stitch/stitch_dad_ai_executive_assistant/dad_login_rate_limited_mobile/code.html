<style>
      body {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      /* Custom focus ring for indigo buttons */
      .focus-ring-primary:focus {

      }

<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-6">
<!-- Subtle Background Ambient Effect -->
<div class="fixed inset-0 -z-10 overflow-hidden">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary-container/5 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-secondary-container/5 blur-[120px]"></div>
</div>
<!-- Login Container -->
<main class="w-full max-w-[400px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<!-- Logo Area -->
<div class="flex flex-col items-center mb-10 text-center">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center shadow-lg shadow-primary/20 mb-4 transition-transform hover:scale-105 duration-300">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="smart_toy">smart_toy</span>
</div>
<h1 class="font-headline-xl text-headline-xl text-on-surface tracking-tighter">Dad</h1>
<p class="font-body-md text-on-surface-variant mt-1 opacity-80">Your AI chief of staff</p>
</div>
<!-- Card -->
<div class="bg-surface-container-lowest border border-outline-variant/50 rounded-xl shadow-xl shadow-on-surface/5 p-card-padding">
<!-- Rate-Limited State Notification -->
<div class="flex items-center gap-3 p-3 mb-6 bg-tertiary-fixed/30 border border-tertiary/20 rounded-lg text-tertiary animate-pulse" id="rate-limit-alert">
<span class="material-symbols-outlined text-[20px]" data-icon="info">info</span>
<span class="font-label-md text-label-md">Too many attempts. Please slow down and try again shortly.</span>
</div>
<form class="space-y-6" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label-md text-label-md text-on-surface-variant px-1" for="email">EMAIL ADDRESS</label>
<div class="relative group">
<input class="w-full h-12 bg-surface-container-low border border-outline-variant rounded-lg px-4 py-2 font-body-md text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" id="email" placeholder="marcus@aurelius.com" type="email"/>
<div class="absolute inset-y-0 right-3 flex items-center text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">PASSWORD</label>
<a class="font-label-md text-label-md text-primary hover:underline transition-all" href="#">Forgot?</a>
</div>
<div class="relative group">
<input class="w-full h-12 bg-surface-container-low border border-outline-variant rounded-lg px-4 py-2 font-body-md text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-3 flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full h-12 bg-primary text-on-primary font-headline-md text-headline-md rounded-lg shadow-md shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 focus:ring-2 focus:ring-primary/40" type="submit">
                    Sign in
                    <span class="material-symbols-outlined text-[18px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Social/Other Sign-ins -->
<div class="mt-8 flex flex-col items-center gap-6">
<div class="relative w-full flex items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="mx-4 font-label-sm text-label-sm text-outline">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<div class="flex gap-4 w-full">
<button class="flex-1 h-12 border border-outline-variant rounded-lg flex items-center justify-center gap-2 hover:bg-surface-container-high transition-colors active:scale-95 duration-200">
<img class="w-5 h-5" data-alt="Official Google Logo icon on a white background, representing corporate login services with high-end digital precision." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCqYlVwtSI6jIGxMIORvz_yBzd0zS9ICGbJluqAxB0SRXSTrk_zfHxt3_HQZLpEC6D3Bjmj2xfT1a2UmbUZ1E0KkmKvoAEMGVfeTQ6kKkvY4ulQ6gGYutwyygEyB00lJc-he9LV5Z9UXWFgkRxeBNu0IXksIN4PHOm-3s7oyT0OMH149QjNH29nXlgY33-InV8uX8UiZxV1roL2ewXXJJ-8-2opZS85OywRj4XpwZoAvTlJTkxmmyMQ"/>
<span class="font-body-md text-on-surface">Google</span>
</button>
<button class="flex-1 h-12 border border-outline-variant rounded-lg flex items-center justify-center gap-2 hover:bg-surface-container-high transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-[20px] text-on-surface" data-icon="terminal">terminal</span>
<span class="font-body-md text-on-surface">SSO</span>
</button>
</div>
</div>
</div>
<!-- Footer -->
<footer class="mt-8 flex flex-col items-center gap-2">
<p class="font-label-sm text-label-sm text-on-surface-variant">
                Don't have an executive account? <a class="text-primary font-semibold hover:underline" href="#">Apply for access</a>
</p>
<p class="font-label-sm text-label-sm text-outline mt-4 opacity-70">
                © 2024 Dad AI. Professional Confidentiality Guaranteed.
            </p>
</footer>
</main>
<!-- Micro-interactions Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            // Password toggle logic
            const togglePass = document.querySelector('[data-icon="visibility"]').parentElement;
            const passInput = document.getElementById('password');
            
            togglePass.addEventListener('click', () => {
                const isPass = passInput.type === 'password';
                passInput.type = isPass ? 'text' : 'password';
                togglePass.querySelector('span').textContent = isPass ? 'visibility_off' : 'visibility';
            });

            // Subtle shake effect on the rate-limit box when form is submitted
            const loginBtn = document.querySelector('button[type="submit"]');
            const alertBox = document.getElementById('rate-limit-alert');
            
            loginBtn.addEventListener('click', (e) => {
                e.preventDefault();
                alertBox.classList.remove('animate-pulse');
                alertBox.classList.add('translate-x-1');
                setTimeout(() => alertBox.classList.remove('translate-x-1'), 100);
                setTimeout(() => alertBox.classList.add('-translate-x-1'), 200);
                setTimeout(() => alertBox.classList.remove('-translate-x-1'), 300);
                setTimeout(() => alertBox.classList.add('animate-pulse'), 400);
            });
        });
    </script>
</body></html>
