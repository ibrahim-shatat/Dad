<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dad - AI Executive Assistant Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed": "#ffdbcc",
                    "error-container": "#ffdad6",
                    "on-primary-container": "#dad7ff",
                    "surface-container-high": "#e8e7f1",
                    "surface-variant": "#e3e1ec",
                    "surface-dim": "#dad9e3",
                    "on-primary": "#ffffff",
                    "surface-bright": "#fbf8ff",
                    "surface-container-highest": "#e3e1ec",
                    "surface-container": "#eeedf7",
                    "on-tertiary-container": "#ffd2be",
                    "on-secondary-fixed": "#07006c",
                    "primary-container": "#4f46e5",
                    "on-tertiary": "#ffffff",
                    "on-tertiary-fixed-variant": "#7b2f00",
                    "surface-tint": "#4d44e3",
                    "tertiary-fixed-dim": "#ffb695",
                    "primary-fixed": "#e2dfff",
                    "surface": "#fbf8ff",
                    "on-error-container": "#93000a",
                    "secondary": "#4648d4",
                    "background": "#fbf8ff",
                    "tertiary-container": "#a44100",
                    "inverse-surface": "#2f3038",
                    "secondary-fixed": "#e1e0ff",
                    "on-secondary-fixed-variant": "#2f2ebe",
                    "inverse-primary": "#c3c0ff",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#f4f2fd",
                    "primary": "#3525cd",
                    "secondary-fixed-dim": "#c0c1ff",
                    "on-surface-variant": "#464555",
                    "error": "#ba1a1a",
                    "tertiary": "#7e3000",
                    "primary-fixed-dim": "#c3c0ff",
                    "outline": "#777587",
                    "on-error": "#ffffff",
                    "on-background": "#1a1b22",
                    "on-surface": "#1a1b22",
                    "on-secondary-container": "#fffbff",
                    "secondary-container": "#6063ee",
                    "on-tertiary-fixed": "#351000",
                    "outline-variant": "#c7c4d8"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "container-max": "1440px",
                    "margin-page": "40px",
                    "unit": "4px",
                    "gutter": "24px",
                    "card-padding": "20px"
            },
            "fontFamily": {
                    "headline-md": ["Inter"],
                    "label-md": ["Inter"],
                    "headline-lg": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-sm": ["Inter"],
                    "headline-xl": ["Inter"],
                    "body-md": ["Inter"]
            },
            "fontSize": {
                    "headline-md": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "500"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                    "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.015em", "fontWeight": "600"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "400"}],
                    "headline-xl": ["36px", {"lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fbf8ff; /* background color from theme */
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-background {
            background: rgba(251, 248, 255, 0.8);
            backdrop-filter: blur(20px);
        }
        .card-shadow {
            box-shadow: 0px 4px 12px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen relative overflow-hidden">
<!-- Subtle Atmospheric Background -->
<div class="absolute inset-0 pointer-events-none">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-secondary/5 rounded-full blur-3xl"></div>
</div>
<!-- Main Content Shell -->
<main class="w-full max-w-[400px] px-6 z-10">
<!-- Login Card -->
<div class="bg-surface-container-lowest border border-outline-variant rounded-xl p-8 card-shadow">
<!-- Branding Header -->
<div class="flex flex-col items-center text-center mb-10">
<div class="mb-4 text-primary">
<span class="material-symbols-outlined text-[48px]" data-icon="smart_toy">smart_toy</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">Dad</h1>
<p class="font-body-md text-on-surface-variant mt-1">Your AI chief of staff</p>
</div>
<!-- Login Form -->
<form class="space-y-6" id="loginForm" onsubmit="return false;">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/60 text-lg" data-icon="mail">mail</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md" id="email" name="email" placeholder="marcus@aurelius.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/60 text-lg" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-surface-container-low border border-outline-variant rounded-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all font-body-md" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Error Banner (Subtle & Thematic) -->
<div class="hidden animate-in fade-in slide-in-from-top-1 duration-200" id="errorBanner">
<div class="bg-error-container text-on-error-container px-4 py-3 rounded-lg flex items-center gap-3 border border-error/20">
<span class="material-symbols-outlined text-sm" data-icon="error_outline">error_outline</span>
<span class="font-label-md text-label-md">Incorrect email or password.</span>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-4 bg-primary text-on-primary rounded-lg font-label-md text-[14px] font-semibold hover:bg-primary-container transition-all active:scale-[0.98] card-shadow flex items-center justify-center gap-2" id="signInBtn">
                    Sign in
                    <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Footer Links -->
<div class="text-center">
<p class="font-label-md text-label-md text-on-surface-variant">
                        Secure AI-Enterprise Environment
                    </p>
</div>
</form>
</div>
<!-- System Footer (Matches predicted Footer styles) -->
<footer class="mt-8 text-center space-y-4">
<div class="flex justify-center gap-6">
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Security Architecture</a>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant/60">
                © 2024 Dad AI. Professional Confidentiality Guaranteed.
            </p>
</footer>
</main>
<script>
        // Micro-interaction for demoing the error state and focus
        const loginForm = document.getElementById('loginForm');
        const errorBanner = document.getElementById('errorBanner');
        const signInBtn = document.getElementById('signInBtn');

        signInBtn.addEventListener('click', (e) => {
            // Trigger error state for visual demonstration as requested
            errorBanner.classList.remove('hidden');
            
            // Shake animation
            signInBtn.classList.add('animate-shake');
            setTimeout(() => {
                signInBtn.classList.remove('animate-shake');
            }, 500);
        });

        // Toggle Password Visibility
        const togglePass = document.querySelector('button[type="button"]');
        const passInput = document.getElementById('password');
        togglePass.addEventListener('click', () => {
            const isPassword = passInput.type === 'password';
            passInput.type = isPassword ? 'text' : 'password';
            togglePass.innerHTML = `<span class="material-symbols-outlined text-lg">${isPassword ? 'visibility_off' : 'visibility'}</span>`;
        });
    </script>
<style>
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .animate-shake {
            animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
            animation-iteration-count: 2;
        }
    </style>
</body></html>
