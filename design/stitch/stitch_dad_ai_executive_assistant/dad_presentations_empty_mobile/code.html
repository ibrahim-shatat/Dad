<body class="bg-background text-on-background min-h-screen flex flex-col">

<!-- Main Illustration Frame -->
<div class="relative w-64 h-64 flex items-center justify-center">
<div class="w-full h-full rounded-[40px] overflow-hidden border border-outline-variant/30 shadow-sm bg-surface-container-low p-6 flex flex-col gap-3">
<div class="w-full h-32 bg-primary-fixed-dim/20 rounded-xl flex items-center justify-center">

</div>
<div class="space-y-2">
<div class="h-2 w-3/4 bg-outline-variant/40 rounded-full"></div>
<div class="h-2 w-1/2 bg-outline-variant/40 rounded-full"></div>
<div class="h-2 w-2/3 bg-outline-variant/40 rounded-full"></div>
</div>
<div class="mt-auto flex justify-center">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center shadow-lg transform translate-y-4">

</div>
</div>
</div>

<script>
        // Micro-interaction for the central illustration
        document.addEventListener('mousemove', (e) => {
            const container = document.querySelector('.relative.w-64.h-64');
            if (window.innerWidth < 1024) return; // Only for desktop-like hovers if testing
            
            const rect = container.getBoundingClientRect();
            const x = e.clientX - rect.left - rect.width / 2;
            const y = e.clientY - rect.top - rect.height / 2;
            
            const tiltX = (y / rect.height) * 10;
            const tiltY = (x / rect.width) * -10;
            
            container.querySelector('.empty-state-card || div').style.transform = `perspective(1000px) rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;
        });
    </script>
