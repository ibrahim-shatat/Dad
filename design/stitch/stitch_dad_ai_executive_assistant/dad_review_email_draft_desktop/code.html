<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .modal-blur {
            backdrop-filter: blur(8px);
        }
        /* Custom scrollbar for the modal body */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e3e1ec;
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #c7c4d8;
        }
    </style>

<body class="bg-surface text-on-surface overflow-hidden">
<!-- Backdrop Dimmed Background -->
<div class="fixed inset-0 bg-inverse-surface/30 modal-blur z-40 flex items-center justify-center p-4">
<!-- Modal Container -->
<div class="bg-surface-container-lowest w-full max-w-[520px] max-h-[90vh] rounded-xl shadow-2xl flex flex-col border border-outline-variant overflow-hidden animate-in fade-in zoom-in duration-300">
<!-- Modal Header -->
<div class="flex items-center justify-between px-6 py-4 border-b border-outline-variant">
<h1 class="font-headline-md text-headline-md text-on-surface">Review email draft</h1>
<button class="p-2 hover:bg-surface-container rounded-full transition-colors text-on-surface-variant active:scale-95 duration-200">
<span class="material-symbols-outlined block">close</span>
</button>
</div>
<!-- Modal Body (Scrollable Form) -->
<div class="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-6">
<!-- Recipient Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">To</label>
<input class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="Enter recipient email" type="text" value="alex.jordan@company.com"/>
</div>
<!-- CC Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Cc</label>
<input class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="Add CC recipients" type="text" value=""/>
</div>
<!-- Subject Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Subject</label>
<input class="w-full px-4 py-3 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" placeholder="Email subject line" type="text" value="Re: Q4 Strategy Revisions"/>
</div>
<!-- Body Field -->
<div class="space-y-2">
<div class="flex items-center justify-between">
<label class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Body</label>
<span class="inline-flex items-center gap-1 bg-primary-fixed text-on-primary-fixed px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-tighter">
<span class="material-symbols-outlined text-[12px]">auto_awesome</span>
                            AI Assisted
                        </span>
</div>
<textarea class="w-full px-4 py-4 bg-surface-container-low border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all resize-none leading-relaxed" rows="10">Hi Alex,

I've reviewed the proposed Q4 Strategy Revisions you shared earlier this morning. The shift toward a more aggressive customer acquisition model in the mid-market segment aligns perfectly with our overarching fiscal objectives.

I have a few clarifying questions regarding the resource allocation for the engineering sprint mentioned on page 4. Could we find 15 minutes tomorrow afternoon to sync on this before I sign off for the final executive review?

Best regards,

John Doe
Executive VP</textarea>
</div>
</div>
<!-- Modal Footer -->
<div class="px-6 py-4 bg-surface-container-low border-t border-outline-variant flex items-center justify-end gap-3">
<button class="px-6 py-2.5 rounded-lg border border-outline text-on-surface-variant font-label-md text-label-md hover:bg-surface-container-high active:scale-[0.98] transition-all">
                    Close
                </button>
<button class="px-6 py-2.5 rounded-lg bg-primary text-on-primary font-label-md text-label-md shadow-sm hover:shadow-md hover:opacity-90 active:scale-[0.98] transition-all">
                    Save changes
                </button>
</div>
</div>
</div>
<!-- Background Content (Simulated Dashboard) -->
<div class="fixed inset-0 -z-10 bg-surface flex flex-col">
<!-- Minimal Top Bar -->
<header class="h-16 flex items-center justify-between px-margin-page border-b border-outline-variant">
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded flex items-center justify-center text-on-primary font-bold">D</div>
<span class="font-headline-md text-headline-md text-primary font-bold">Dad</span>
</div>
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full bg-surface-container-highest"></div>
</div>
</header>
<!-- Mock Bento Dashboard Content -->
<main class="flex-1 p-margin-page">
<div class="max-w-container-max mx-auto grid grid-cols-12 gap-gutter">
<div class="col-span-8 h-64 bg-surface-container-low border border-outline-variant rounded-xl p-card-padding">
<div class="w-1/3 h-4 bg-surface-dim rounded-full mb-4"></div>
<div class="space-y-3">
<div class="w-full h-2 bg-surface-container rounded-full"></div>
<div class="w-5/6 h-2 bg-surface-container rounded-full"></div>
<div class="w-4/6 h-2 bg-surface-container rounded-full"></div>
</div>
</div>
<div class="col-span-4 h-64 bg-surface-container-low border border-outline-variant rounded-xl p-card-padding">
<div class="w-1/2 h-4 bg-surface-dim rounded-full mb-4"></div>
<div class="flex justify-center py-4">
<div class="w-24 h-24 rounded-full border-4 border-primary/20 border-t-primary animate-spin"></div>
</div>
</div>
<div class="col-span-4 h-48 bg-surface-container-low border border-outline-variant rounded-xl p-card-padding"></div>
<div class="col-span-4 h-48 bg-surface-container-low border border-outline-variant rounded-xl p-card-padding"></div>
<div class="col-span-4 h-48 bg-surface-container-low border border-outline-variant rounded-xl p-card-padding"></div>
</div>
</main>
</div>
<script>
        // Simple interactivity for the Close buttons
        document.querySelectorAll('button').forEach(btn => {
            if (btn.innerText.includes('Close') || btn.querySelector('.material-symbols-outlined')?.innerText === 'close') {
                btn.addEventListener('click', () => {
                    const modal = document.querySelector('.fixed.inset-0.bg-inverse-surface\\/30');
                    modal.classList.add('opacity-0', 'pointer-events-none');
                    modal.querySelector('.animate-in').classList.add('scale-95');
                    setTimeout(() => {
                        modal.style.display = 'none';
                    }, 300);
                });
            }
        });

        // Add visual feedback on Save
        const saveBtn = document.querySelector('.bg-primary');
        saveBtn.addEventListener('click', () => {
            saveBtn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px]">progress_activity</span> Saving...';
            setTimeout(() => {
                saveBtn.innerHTML = 'Saved!';
                saveBtn.classList.replace('bg-primary', 'bg-tertiary-container');
            }, 1000);
        });
    </script>
</body></html>
